<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burp Smart Assistant - Configuration</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <style>
    .config-container {
      width: 90%;
      max-width: 1000px;
      margin: 3rem auto;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    h2 { color: var(--primary); margin-bottom: 1rem; }
    label { font-weight: 600; color: var(--text-dark); display: block; margin: 1rem 0 0.3rem; }
    select, input, button {
      padding: 0.6rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      width: 100%;
      font-family: inherit;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 1.5rem;
    }
    button:hover { background: #174ac5; }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-title">Configuration Control</div>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/configuration">Configuration</a>
    </div>
  </nav>

  <div class="config-container">
    <h2>Burp Configuration Settings</h2>

    <form id="configForm">
      <label>Scanner Threshold</label>
      <select id="scanner_threshold">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <label>Enable Active Checks</label>
      <input type="checkbox" id="active_checks">

      <label>Enable Passive Checks</label>
      <input type="checkbox" id="passive_checks">

      <label>Scan Speed (1–10)</label>
      <input type="range" id="scan_speed" min="1" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value">
      <span>5</span>

      <label>Max Concurrent Scans</label>
      <input type="number" id="max_scans" min="1" max="10" value="2">

      <button type="button" onclick="saveConfig()">💾 Save Settings</button>
      <button type="button" onclick="applyConfig()">⚙️ Apply to Burp</button>
    </form>
  </div>

  <script>
    async function saveConfig() {
      const cfg = getFormData();
      const res = await fetch('/api/config', {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(cfg)
      });
      alert(res.ok ? 'Configuration saved!' : 'Failed to save.');
    }

    async function applyConfig() {
      const cfg = getFormData();
      const res = await fetch('/api/config/apply', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(cfg)
      });
      alert(res.ok ? 'Configuration applied to Burp!' : 'Failed to apply.');
    }

    function getFormData() {
      return {
        scanner_threshold: document.getElementById('scanner_threshold').value,
        active_checks: document.getElementById('active_checks').checked,
        passive_checks: document.getElementById('passive_checks').checked,
        scan_speed: Number(document.getElementById('scan_speed').value),
        max_scans: Number(document.getElementById('max_scans').value)
      };
    }

    window.onload = async () => {
      const res = await fetch('/api/config');
      if (res.ok) {
        const cfg = await res.json();
        document.getElementById('scanner_threshold').value = cfg.scanner_threshold;
        document.getElementById('active_checks').checked = cfg.active_checks;
        document.getElementById('passive_checks').checked = cfg.passive_checks;
        document.getElementById('scan_speed').value = cfg.scan_speed;
        document.querySelector('span').textContent = cfg.scan_speed;
        document.getElementById('max_scans').value = cfg.max_scans;
      }
    }
  </script>
</body>
</html>

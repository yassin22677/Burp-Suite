<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login | Burp Config AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0c1426;
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      max-width: 420px;
      width: 100%;
      background: #181e33;
      color: #eaf1fb;
      border-radius: 17px;
      box-shadow: 0 4px 32px 0 rgba(28, 40, 92, .13);
      padding: 38px 32px 28px 32px;
      margin: 32px 0;
    }

    .auth-title {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      color: #53cfff;
    }

    .auth-sub {
      color: #7ba9ff;
      font-size: 1.021rem;
      margin-bottom: 27px;
      font-weight: 400;
    }

    .form-label {
      color: #b9ceea;
      font-size: 1rem;
      font-weight: 500;
    }

    .form-control {
      background: #13182a;
      border: 1.3px solid #243352;
      color: #eaf1fb;
      border-radius: 8px;
      font-size: 1.09rem;
    }

    .form-control:focus {
      border-color: #53cfff;
      background: #17203a;
      color: #eaf1fb;
      box-shadow: 0 0 0 0.13rem #53cfff25;
    }

    .btn-primary {
      background: linear-gradient(90deg, #2597ff 70%, #25d4b2 120%);
      border: none;
      font-weight: 700;
      font-size: 1.08em;
      border-radius: 8px;
      box-shadow: 0 2px 12px 0 rgba(42, 186, 235, 0.10);
      transition: background 0.18s;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #1e7de6 60%, #1dc6a2 120%);
    }

    .auth-link {
      color: #5cd8e7;
      text-decoration: none;
      font-weight: 500;
      margin-left: 3px;
    }

    .auth-link:hover {
      color: #1dd6ff;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-title mb-1">Log In</div>
      <div class="auth-sub">Sign in to access Burp Suite Smart Assistant</div>
    </div>

    <div id="alert-box"></div>

    <form onsubmit="return false;" autocomplete="off">
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" placeholder="name@example.com" autocomplete="username"
          required>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password" autocomplete="current-password"
          required>
      </div>
      <div class="d-grid mb-3">
        <button type="button" id="login-btn" class="btn btn-primary btn-lg">Login</button>
      </div>
      <div class="text-center">
        <span>Don't have an account?</span>
        <a class="auth-link" href="/auth/register">Register</a>
      </div>
    </form>
  </div>

  <script>
    async function login() {
      // Hide any existing alert
      showAlert(null);

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert("Please enter both email and password.", "warning");
        return;
      }

      try {
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password }),
        });

        let data;
        try {
          data = await response.json();
        } catch (e) {
          showAlert("Invalid server response. Please try again.", "danger");
          return;
        }

        if (!response.ok) {
          showAlert(data.error || "Login failed. Please check your credentials.", "danger");
          return;
        }
        if (data.access_token) {
          localStorage.setItem("access_token", data.access_token);
          window.location.href = "/dashboard";
        } else {
          showAlert("Unexpected response. Please try again.", "danger");
        }

      } catch (err) {
        showAlert("Could not connect to server. Please try again.", "danger");
      }
    }

    function showAlert(msg, type = "danger") {
      const alertBox = document.getElementById("alert-box");
      if (!msg) {
        alertBox.innerHTML = "";
        return;
      }
      alertBox.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert" style="margin-bottom:18px">
          ${msg}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="top:2px"></button>
        </div>
      `;
    }

    document.getElementById("login-btn").addEventListener("click", login);

    // Enable Enter key submit
    document.getElementById("password").addEventListener("keyup", function (event) {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

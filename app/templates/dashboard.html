<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Live RL Logs</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #0d1117;
        color: #c9d1d9;
        font-family: Consolas, Menlo, Monaco, "Courier New", monospace;
    }

    header {
        padding: 12px 16px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        font-size: 14px;
        font-weight: bold;
    }

    #status {
        color: #3fb950;
    }

    #log-container {
        height: calc(100% - 45px);
        overflow-y: auto;
        padding: 12px;
        white-space: pre-wrap;
        line-height: 1.35;
        font-size: 13px;
    }

    .line {
        padding: 2px 0;
    }

    /* Optional visual hints (do NOT change content) */
    .REQ { color: #58a6ff; }
    .ACT { color: #f0883e; }
    .APPLY { color: #d2a8ff; }
    .RESP { color: #7ee787; }
    .SCAN { color: #ffa657; }
    .REWARD { color: #ff7b72; }
    .ERROR { color: #ff0000; }
</style>
</head>

<body>

<header>
    Live RL Logs — Status: <span id="status">connecting…</span>
</header>

<div id="log-container"></div>

<!-- ================= SOCKET.IO CLIENT ================= -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
(function () {

    const statusEl = document.getElementById("status");
    const logBox   = document.getElementById("log-container");

    // IMPORTANT: must match backend host/port
    const socket = io("http://127.0.0.1:5000", {
        transports: ["websocket", "polling"],
        reconnection: true
    });

    socket.on("connect", () => {
        statusEl.textContent = "connected";
    });

    socket.on("disconnect", () => {
        statusEl.textContent = "disconnected";
        statusEl.style.color = "#ff7b72";
    });

    socket.on("connect_error", () => {
        statusEl.textContent = "connection error";
        statusEl.style.color = "#ff7b72";
    });

    // ================= RECEIVE RAW LOG =================
    socket.on("rl_log", (msg) => {

        // STRICT: only accept { line: "..." }
        if (!msg || typeof msg.line !== "string") {
            return;
        }

        const div = document.createElement("div");
        div.className = "line";

        // Optional coloring based on tag (visual only)
        if (msg.line.includes("[RL][REQ]"))   div.classList.add("REQ");
        if (msg.line.includes("[RL][ACT]"))   div.classList.add("ACT");
        if (msg.line.includes("[RL][APPLY]")) div.classList.add("APPLY");
        if (msg.line.includes("[RL][RESP]"))  div.classList.add("RESP");
        if (msg.line.includes("[RL][SCAN]"))  div.classList.add("SCAN");
        if (msg.line.includes("[RL][REWARD]"))div.classList.add("REWARD");
        if (msg.line.includes("[RL][ERROR]")) div.classList.add("ERROR");

        // 🔒 EXACT LINE — no changes
        div.textContent = msg.line;

        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    });

})();
</script>

</body>
</html>

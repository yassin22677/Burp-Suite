<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | Burp Config AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0c1426;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            background: #181e33;
            color: #eaf1fb;
            border-radius: 17px;
            box-shadow: 0 4px 32px 0 rgba(28, 40, 92, .13);
            padding: 38px 32px 28px 32px;
            margin: 32px 0;
        }

        .auth-title {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: #53cfff;
        }

        .auth-sub {
            color: #7ba9ff;
            font-size: 1.021rem;
            margin-bottom: 27px;
            font-weight: 400;
        }

        .form-label {
            color: #b9ceea;
            font-size: 1rem;
            font-weight: 500;
        }

        .auth-link {
            color: #53cfff;
            text-decoration: none;
            font-weight: 500;
            margin-left: 0.25rem;
        }

        .auth-link:hover {
            text-decoration: underline;
            color: #30bbfd;
        }

        .btn-primary {
            background: linear-gradient(90deg, #30bbfd 0%, #53cfff 100%);
            border: none;
            font-size: 1.03rem;
            font-weight: 700;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #53cfff 0%, #30bbfd 100%);
        }

        .form-control,
        .form-control:focus {
            background: #161b2e;
            border: 1px solid #273566;
            color: #eaf1fb;
            border-radius: 7px;
            min-height: 46px;
            font-size: 1.02rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(83, 207, 255, 0.22);
            border-color: #53cfff;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-title mb-1">Register</div>
            <div class="auth-sub">Create your free account</div>
        </div>

        <div id="alert-box"></div>

        <form onsubmit="return false;" autocomplete="off">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Your username"
                    autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" autocomplete="email"
                    required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Password"
                    autocomplete="new-password" required>
            </div>
            <div class="d-grid mb-3">
                <button type="button" id="register-btn" class="btn btn-primary btn-lg">Register</button>
            </div>
            <div class="text-center">
                <span>Already have an account?</span>
                <a class="auth-link" href="/auth/login">Login</a>
            </div>
        </form>
    </div>

    <script>
        async function register() {
            showAlert(null);

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !email || !password) {
                showAlert("Please fill out all fields.", "warning");
                return;
            }

            try {
                const response = await fetch("/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, email, password })
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    showAlert("Invalid server response. Please try again.", "danger");
                    return;
                }

                if (!response.ok) {
                    showAlert(data.error || "Registration failed. Please try again.", "danger");
                    return;
                }

                // Success
                showAlert("Registration successful! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "/auth/login";
                }, 1200);

            } catch (err) {
                showAlert("Could not connect to server. Please try again.", "danger");
            }
        }

        function showAlert(msg, type = "danger") {
            const alertBox = document.getElementById("alert-box");
            if (!msg) {
                alertBox.innerHTML = "";
                return;
            }
            alertBox.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert" style="margin-bottom:18px">
          ${msg}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="top:2px"></button>
        </div>
      `;
        }

        document.getElementById("register-btn").addEventListener("click", register);

        // Enable Enter key submit on password
        document.getElementById("password").addEventListener("keyup", function (event) {
            if (event.key === "Enter") {
                register();
            }
        });
        // (optional gentle UX: also enable Enter on email or username fields, only triggers if fields are filled)
        document.getElementById("username").addEventListener("keyup", function (event) {
            if (event.key === "Enter") {
                register();
            }
        });
        document.getElementById("email").addEventListener("keyup", function (event) {
            if (event.key === "Enter") {
                register();
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
